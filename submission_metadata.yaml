  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "ChatGPT"

ai_usage_summary: |
  AI coding assistance was used for implementation support, documentation review,
  and debugging. Candidate ranking runs locally without hosted model calls.

methodology_summary: |
  Intelligent Recruiter uses a two-stage ranking pipeline. Stage 1 streams the
  candidate pool and scores deterministic evidence from career text, experience,
  location, behavioral availability, and profile plausibility. Stage 2 re-ranks
  the shortlist using BM25, TF-IDF, and an optional local MiniLM or LSA semantic
  layer, then exports deterministic ranks with fact-grounded reasoning.

declarations:
  code_is_original_work: true
  no_external_api_calls_during_ranking: true
  cpu_only_ranking: true
  honeypot_check_done: true
  reproduction_tested: true

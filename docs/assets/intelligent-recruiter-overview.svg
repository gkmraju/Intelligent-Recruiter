<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Intelligent Recruiter product overview</title>
  <desc id="desc">A visual overview of the offline candidate ranking pipeline from data ingestion to ranked recruiter export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#172554"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="0" x2="1060" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="470" rx="28" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="402" rx="24" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.16"/>
  <rect x="94" y="92" width="1012" height="4" rx="2" fill="url(#accent)"/>

  <text x="96" y="74" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Intelligent Recruiter</text>
  <text x="96" y="130" fill="#bfdbfe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Offline candidate intelligence pipeline</text>

  <g filter="url(#shadow)">
    <rect x="78" y="178" width="210" height="142" rx="18" fill="#f8fafc"/>
    <rect x="98" y="198" width="42" height="42" rx="12" fill="#dbeafe"/>
    <text x="113" y="226" fill="#1d4ed8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">1</text>
    <text x="98" y="268" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Ingest</text>
    <text x="98" y="294" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">JSONL / GZ candidate pool</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="344" y="178" width="210" height="142" rx="18" fill="#f8fafc"/>
    <rect x="364" y="198" width="42" height="42" rx="12" fill="#ede9fe"/>
    <text x="379" y="226" fill="#7c3aed" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">2</text>
    <text x="364" y="268" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Score</text>
    <text x="364" y="294" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Evidence, behavior, plausibility</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="178" width="210" height="142" rx="18" fill="#f8fafc"/>
    <rect x="630" y="198" width="42" height="42" rx="12" fill="#ccfbf1"/>
    <text x="645" y="226" fill="#0f766e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">3</text>
    <text x="630" y="268" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Re-rank</text>
    <text x="630" y="294" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">BM25, TF-IDF, MiniLM / LSA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="876" y="178" width="246" height="142" rx="18" fill="#f8fafc"/>
    <rect x="896" y="198" width="42" height="42" rx="12" fill="#dcfce7"/>
    <text x="911" y="226" fill="#15803d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">4</text>
    <text x="896" y="268" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Export</text>
    <text x="896" y="294" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Top-100 CSV with reasoning</text>
  </g>

  <path d="M296 249H334" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
  <path d="M326 239L336 249L326 259" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M562 249H600" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
  <path d="M592 239L602 249L592 259" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M828 249H866" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
  <path d="M858 239L868 249L858 259" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="92" y="360" width="206" height="42" rx="21" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="120" y="387" fill="#e0f2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">CPU only</text>
    <circle cx="269" cy="381" r="6" fill="#22c55e"/>
  </g>
  <g>
    <rect x="326" y="360" width="228" height="42" rx="21" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="354" y="387" fill="#e0f2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">No rank-time network</text>
    <circle cx="525" cy="381" r="6" fill="#22c55e"/>
  </g>
  <g>
    <rect x="582" y="360" width="228" height="42" rx="21" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="610" y="387" fill="#e0f2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Deterministic output</text>
    <circle cx="781" cy="381" r="6" fill="#22c55e"/>
  </g>
  <g>
    <rect x="838" y="360" width="270" height="42" rx="21" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="866" y="387" fill="#e0f2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Fact-grounded reasoning</text>
    <circle cx="1079" cy="381" r="6" fill="#22c55e"/>
  </g>
</svg>
